<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ваша ссылка — BazaraVPN</title>
  <style>
    body {
      background: #181818;
      color: #fff;
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: #232323;
      border-radius: 1.5rem;
      box-shadow: 0 2px 24px 0 #ff880088;
      padding: 2.5rem 2rem 2rem 2rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .link-block {
      background: #181818;
      border-radius: 1rem;
      padding: 1.2rem 1rem;
      margin: 1.2rem 0 1.5rem 0;
      font-size: 1.1rem;
      word-break: break-all;
      box-shadow: 0 0 0 2px #ff880044;
      color: #ff8800;
    }
    .copy-btn {
      background: linear-gradient(90deg, #ff8800 0%, #a259ff 100%);
      color: #fff;
      border: none;
      border-radius: 1rem;
      padding: 0.9rem 2.2rem;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 16px 0 #ff880088;
      transition: background 0.18s, box-shadow 0.18s;
    }
    .copy-btn:hover {
      background: linear-gradient(90deg, #a259ff 0%, #ff8800 100%);
      box-shadow: 0 0 32px 0 #ff8800cc;
    }
    .success {
      color: #00ff99;
      margin-top: 1.2rem;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2 style="font-size:2rem;font-weight:800;margin-bottom:1.2rem;">Ваша ссылка готова!</h2>
    <div id="link-block" class="link-block">Загрузка...</div>
    <button class="copy-btn" id="copy-btn">Скопировать</button>
    <div id="copy-success" class="success" style="display:none;">Скопировано!</div>
  </div>
  <script>
    function getLinkFromQuery() {
      const params = new URLSearchParams(window.location.search);
      return params.get('link') || '';
    }
    const link = decodeURIComponent(getLinkFromQuery());
    const linkBlock = document.getElementById('link-block');
    if (link) {
      linkBlock.textContent = link;
    } else {
      linkBlock.textContent = 'Ссылка не найдена.';
    }
    document.getElementById('copy-btn').onclick = function() {
      if (!link) return;
      navigator.clipboard.writeText(link).then(() => {
        document.getElementById('copy-success').style.display = 'block';
        setTimeout(() => {
          document.getElementById('copy-success').style.display = 'none';
        }, 1500);
      });
    };
  </script>
</body>
</html>
