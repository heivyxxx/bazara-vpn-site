  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const translations = {
        ru: {
          'header-advantages': 'Преимущества',
          'header-tariffs': 'Тарифы',
          'header-download': 'Скачать',
          'header-support': 'Поддержка',
          'footer-contacts': 'Контакты',
          'footer-privacy': 'Политика',
          'footer-copyright': '© 2024 BazaraVPN',
          'contacts-title': 'Связаться с поддержкой',
          'contacts-mail-desc': 'Почта поддержки:',
          'contacts-tg-desc': 'Telegram-чат поддержки:',
          'contacts-inst-desc': 'Instagram:',
          'contacts-vk-desc': 'ВКонтакте:',
          'contacts-yt-desc': 'YouTube:',
          'contacts-yt-link': 'YouTube канал',
          'contacts-tt-desc': 'TikTok:',
        },
        en: {
          'header-advantages': 'Advantages',
          'header-tariffs': 'Tariffs',
          'header-download': 'Download',
          'header-support': 'Support',
          'footer-contacts': 'Contacts',
          'footer-privacy': 'Privacy',
          'footer-copyright': '© 2024 BazaraVPN',
          'contacts-title': 'Contact Support',
          'contacts-mail-desc': 'Support email:',
          'contacts-tg-desc': 'Telegram support chat:',
          'contacts-inst-desc': 'Instagram:',
          'contacts-vk-desc': 'VK:',
          'contacts-yt-desc': 'YouTube:',
          'contacts-yt-link': 'YouTube channel',
          'contacts-tt-desc': 'TikTok:',
        }
      };
      const langBtn = document.getElementById('lang-dropdown-btn');
      const langDropdown = document.getElementById('lang-dropdown');
      const langCurrent = document.getElementById('lang-current');
      const langSwitcher = document.getElementById('lang-switcher');
      function setLang(lang) {
        localStorage.setItem('lang', lang);
        if (langCurrent) langCurrent.textContent = lang === 'ru' ? 'Русский' : 'English';
        document.querySelectorAll('[data-i18n]').forEach(el => {
          const key = el.getAttribute('data-i18n');
          if (translations[lang][key]) {
            if (/<[a-z][\s\S]*>/i.test(translations[lang][key])) {
              el.innerHTML = translations[lang][key];
            } else {
              el.textContent = translations[lang][key];
            }
          }
        });
      }
      let lang = localStorage.getItem('lang') || 'ru';
      setLang(lang);
      if (langBtn && langDropdown) {
        langBtn.onclick = function(e) {
          e.stopPropagation();
          langDropdown.classList.toggle('hidden');
        };
        langDropdown.querySelectorAll('[data-lang]').forEach(btn => {
          btn.onclick = function(e) {
            e.stopPropagation();
            setLang(this.getAttribute('data-lang'));
            langDropdown.classList.add('hidden');
          };
        });
        document.addEventListener('click', function(e) {
          if (langDropdown && langSwitcher && !langSwitcher.contains(e.target)) {
            langDropdown.classList.add('hidden');
          }
        });
      }
    });
  </script>
</body>
