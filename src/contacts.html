<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">

  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body{background:#181818;color:#fff;min-height:100vh;} .contact-card{background:#232323;border-radius:1.5rem;box-shadow:0 4px 24px #0003;padding:2.5rem 2rem;margin:2rem auto;max-width:480px;text-align:center;} .contact-icon{width:3rem;height:3rem;margin-bottom:1rem;display:inline-block;} .contact-link{color:#ff8800;font-weight:600;font-size:1.15rem;word-break:break-all;} .contact-link:hover{color:#a259ff;text-decoration:underline;} .contact-title{font-size:2.2rem;font-weight:900;margin-bottom:2rem;text-align:center;background:linear-gradient(90deg,#ff8800 0%,#a259ff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;} .contact-desc{color:#ccc;margin-bottom:2.5rem;font-size:1.1rem;} </style>
</head>
<body>
  <main>
    <h1 class="contact-title">Связаться с поддержкой</h1>
    <div class="contact-card">
      <img src="assets/mail-3d.png" alt="Почта" class="contact-icon">
      <div class="contact-desc">Почта поддержки:</div>
      <a href="mailto:support@bazaravpn.com" class="contact-link">support@bazaravpn.com</a>
    </div>
    <div class="contact-card">
      <svg class="contact-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 4L12 20l-3-7-7-3z"/></svg>
      <div class="contact-desc">Telegram-чат поддержки:</div>
      <a href="https://t.me/bazaravpn_support" class="contact-link" target="_blank">@bazaravpn_support</a>
    </div>
    <div class="contact-card">
      <svg class="contact-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="6"/><circle cx="12" cy="12" r="5"/><circle cx="17" cy="7" r="1.5"/></svg>
      <div class="contact-desc">Instagram:</div>
      <a href="#" class="contact-link" target="_blank">@bazaravpn</a>
    </div>
    <div class="contact-card">
      <svg class="contact-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="6"/><path d="M7 9c1.5 2.5 3.5 4 5 4s3.5-1.5 5-4"/></svg>
      <div class="contact-desc">ВКонтакте:</div>
      <a href="#" class="contact-link" target="_blank">vk.com/bazaravpn</a>
    </div>
    <div class="contact-card">
      <svg class="contact-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="12" rx="4"/><polygon points="10,9 16,12 10,15" fill="currentColor"/></svg>
      <div class="contact-desc">YouTube:</div>
      <a href="#" class="contact-link" target="_blank">YouTube канал</a>
    </div>
    <div class="contact-card">
      <svg class="contact-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 2v15.5a3.5 3.5 0 1 0 3.5-3.5H14V9a5 5 0 0 0 5 5"/></svg>
      <div class="contact-desc">TikTok:</div>
      <a href="#" class="contact-link" target="_blank">@bazaravpn</a>
    </div>
  </main>
</body>
</html>
